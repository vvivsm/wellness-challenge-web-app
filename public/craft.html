<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wellness Quest - Crafting</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/craft.css">
</head>

<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-brand">
                <div class="soup-logo">
                    <div class="mini-bowl"></div>
                </div>
                <span>WELLNESS QUEST</span>
            </div>
            <div class="nav-links">
                <a href="index.html" class="nav-link">HOME</a>
                <a href="challenges.html" class="nav-link">CHALLENGES</a>
                <a href="shop.html" class="nav-link">SHOP</a>
                <a href="craft.html" class="nav-link active">CRAFTING</a>
                <a href="login.html" class="nav-link logout" id="logoutBtn">LOGOUT</a>
            </div>
        </div>
    </nav>

    <!-- Header -->
    <div class="page-header">
        <h1 class="page-title">SOUP CRAFTING</h1>
        <p class="page-subtitle">Craft soups using ingredients from your inventory!</p>
    </div>

    <!-- Main Content -->
    <div class="main-container">

        <!-- Inventory Panel -->
        <div class="inventory-panel">
            <h2 class="panel-title">YOUR INGREDIENTS</h2>
            <div class="inventory-grid" id="inventoryGrid">
                <!-- injected by craft.js -->
            </div>
        </div>

        <!-- Recipe Book -->
        <div class="recipes-panel">
            <h2 class="panel-title">RECIPE BOOK</h2>
            <div class="recipes-container" id="recipesContainer">
                <!-- injected by craft.js -->
            </div>
        </div>

    </div>

    <!-- CSS Modal (status) -->
    <div class="status-modal" id="statusModal">
        <div class="status-modal-box" id="statusModalBox">
            <div class="status-modal-header">
                <div class="status-modal-title" id="statusTitle">STATUS</div>
                <button class="status-modal-close" id="statusCloseBtn">×</button>
            </div>
            <div class="status-modal-body">
                <p id="statusMessage">...</p>
            </div>
            <div class="status-modal-footer">
                <button class="status-modal-ok" id="statusOkBtn">OK</button>
            </div>
        </div>
    </div>

    <footer class="footer">
        <p>© 2024 WELLNESS QUEST - STAY HEALTHY, STAY STRONG!</p>
    </footer>

    <script src="js/queryCmds.js" type="text/javascript"></script>
    <script src="js/getCurrentURL.js" type="text/javascript"></script>
    <script src="js/craft.js"></script>
</body>

</html>
