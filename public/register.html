<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wellness Quest - Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/register.css">
</head>

<body>
    <!-- Clouds -->
    <div class="clouds">
        <div class="cloud"></div>
        <div class="cloud"></div>
        <div class="cloud"></div>
    </div>

    <!-- Particles -->
    <div class="particles" id="particles"></div>

    <div class="container-fluid">
        <div class="row justify-content-center align-items-center min-vh-100 px-3">
            <div class="col-12 col-sm-10 col-md-8 col-lg-5 col-xl-4">
                <div class="panel">
                    <div class="logo">
                        <h1>SOULSIP</h1>
                        <p>Start Your Wellness Journey!</p>
                    </div>

                    <form id="registerForm">
                        <div class="form-group">
                            <label for="registerUsername">USERNAME</label>
                            <input type="text" id="registerUsername" placeholder="Choose a username" required
                                minlength="3">
                        </div>

                        <div class="form-group">
                            <label for="registerEmail">EMAIL</label>
                            <input type="email" id="registerEmail" placeholder="your.email@example.com" required>
                        </div>

                        <div class="form-group">
                            <label for="registerPassword">PASSWORD</label>
                            <input type="password" id="registerPassword" placeholder="Create a password" required
                                minlength="6">
                        </div>

                        <div class="form-group">
                            <label for="registerConfirmPassword">CONFIRM PASSWORD</label>
                            <input type="password" id="registerConfirmPassword" placeholder="Confirm your password"
                                required minlength="6">
                        </div>

                        <button type="submit" class="btn">CREATE ACCOUNT</button>
                        <div id="warningCard" class="card border-danger mt-3 mb-3 d-none">
                            <div class="card-body text-danger">
                                <p id="warningText" class="card-text"></p>
                            </div>
                        </div>
                        <a href="login.html" class="btn btn-secondary btn-link">BACK TO LOGIN</a>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="js/getCurrentURL.js" type="text/javascript"></script>
    <script src="js/queryCmds.js" type="text/javascript"></script>
    <script src="js/register.js"></script>
</body>

</html>
