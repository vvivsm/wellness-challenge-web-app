<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wellness Quest - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/login.css">
</head>

<body>
    <!-- Clouds -->
    <div class="clouds">
        <div class="cloud"></div>
        <div class="cloud"></div>
        <div class="cloud"></div>
    </div>

    <!-- Particles -->
    <div class="particles" id="particles"></div>

    <div class="container-fluid">
        <div class="row justify-content-center align-items-center min-vh-100 px-3">
            <div class="col-12 col-sm-10 col-md-8 col-lg-5 col-xl-4">
                <div class="panel">
                    <div class="logo">
                        <h1>SOULSIP</h1>
                        <p>Complete Challenges • Craft Soups • Get Healthy!</p>
                    </div>

                    <div id="messageContainer"></div>

                    <form id="loginForm">
                        <div class="form-group">
                            <label for="loginUsername">USERNAME</label>
                            <input type="text" id="loginUsername" placeholder="Enter your username" required>
                        </div>

                        <div class="form-group">
                            <label for="loginPassword">PASSWORD</label>
                            <input type="password" id="loginPassword" placeholder="Enter your password" required>
                        </div>

                        <button type="submit" class="btn">LOGIN</button>
                    </form>

                    <div id="warningCard" class="card border-danger mt-3 mb-3 d-none">
                        <div class="card-body text-danger">
                            <p id="warningText" class="card-text"></p>
                        </div>
                    </div>

                    <div class="toggle-text">
                        Don't have an account?
                        <a href="register.html" class="toggle-link">Register here</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/queryCmds.js" type="text/javascript"></script>
    <script src="js/getCurrentURL.js" type="text/javascript"></script>
    <script src="js/login.js"></script>
</body>

</html>
